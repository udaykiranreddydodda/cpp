name: Deploy Smart Inventory Management System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and test library
        run: |
          cd library
          pip install -e .
          pip install pytest
          pytest tests/ -v

  deploy-backend:
    needs: test-library
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name smartinventory-prod --region eu-west-1 > /dev/null 2>&1 || \
          aws dynamodb create-table \
            --table-name smartinventory-prod \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

      - name: Create S3 bucket for files
        run: |
          aws s3api head-bucket --bucket smartinventory-files-prod-udaykiran --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket smartinventory-files-prod-udaykiran \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

          aws s3api put-bucket-cors --bucket smartinventory-files-prod-udaykiran --cors-configuration '{
            "CORSRules": [
              {
                "AllowedHeaders": ["*"],
                "AllowedMethods": ["GET", "PUT", "POST", "DELETE"],
                "AllowedOrigins": ["*"],
                "ExposeHeaders": ["ETag"]
              }
            ]
          }' || true

      - name: Create IAM role for Lambda
        run: |
          aws iam get-role --role-name smartinventory-lambda-role > /dev/null 2>&1 || \
          aws iam create-role \
            --role-name smartinventory-lambda-role \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "lambda.amazonaws.com"
                  },
                  "Action": "sts:AssumeRole"
                }
              ]
            }'

      - name: Attach IAM policies
        run: |
          aws iam attach-role-policy --role-name smartinventory-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess || true
          aws iam attach-role-policy --role-name smartinventory-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess || true
          aws iam attach-role-policy --role-name smartinventory-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess || true
          aws iam attach-role-policy --role-name smartinventory-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true

      - name: Create SNS topic
        run: |
          SNS_ARN=$(aws sns create-topic --name smartinventory-notifications --region eu-west-1 --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_ARN" >> $GITHUB_ENV

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda function
        run: |
          cd backend
          zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda function
        run: |
          ROLE_ARN=$(aws iam get-role --role-name smartinventory-lambda-role --query 'Role.Arn' --output text)
          if aws lambda get-function --function-name smartinventory-api --region eu-west-1 > /dev/null 2>&1; then
            echo "Updating Lambda..."
            aws lambda update-function-code --function-name smartinventory-api --zip-file fileb://lambda.zip --region eu-west-1
            aws lambda wait function-updated --function-name smartinventory-api --region eu-west-1
            aws lambda update-function-configuration --function-name smartinventory-api \
              --runtime python3.11 --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=smartinventory-prod,S3_BUCKET=smartinventory-files-prod-udaykiran,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=smartinventory-secret-2026}" \
              --region eu-west-1
          else
            echo "Creating Lambda..."
            aws lambda create-function --function-name smartinventory-api \
              --runtime python3.11 --role "$ROLE_ARN" --handler lambda_function.lambda_handler \
              --zip-file fileb://lambda.zip --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=smartinventory-prod,S3_BUCKET=smartinventory-files-prod-udaykiran,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=smartinventory-secret-2026}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          # Get or create REST API
          API_ID=$(aws apigateway get-rest-apis --region eu-west-1 --query "items[?name=='smartinventory-api'].id" --output text)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name smartinventory-api --region eu-west-1 --query 'id' --output text)
            echo "Created API Gateway: $API_ID"
          else
            echo "Found existing API Gateway: $API_ID"
          fi

          # Get root resource ID
          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --region eu-west-1 --query "items[?path=='/'].id" --output text)

          # Create {proxy+} resource if not exists
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --region eu-west-1 --query "items[?path=='/{proxy+}'].id" --output text)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --region eu-west-1 --query 'id' --output text)
            echo "Created proxy resource: $PROXY_ID"
          fi

          # Get Lambda ARN
          LAMBDA_ARN=$(aws lambda get-function --function-name smartinventory-api --region eu-west-1 --query 'Configuration.FunctionArn' --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)

          # Put ANY method on {proxy+}
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method ANY --authorization-type NONE --region eu-west-1 || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method ANY --type AWS_PROXY --integration-http-method POST \
            --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/$LAMBDA_ARN/invocations" \
            --region eu-west-1 || true

          # Put OPTIONS method on {proxy+} for CORS
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method OPTIONS --authorization-type NONE --region eu-west-1 || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' \
            --region eu-west-1 || true

          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method OPTIONS --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":false,"method.response.header.Access-Control-Allow-Methods":false,"method.response.header.Access-Control-Allow-Origin":false}' \
            --region eu-west-1 || true

          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method OPTIONS --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' \
            --region eu-west-1 || true

          # Put ANY method on root resource
          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID \
            --http-method ANY --authorization-type NONE --region eu-west-1 || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID \
            --http-method ANY --type AWS_PROXY --integration-http-method POST \
            --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/$LAMBDA_ARN/invocations" \
            --region eu-west-1 || true

          # Add Lambda permission for API Gateway
          aws lambda add-permission --function-name smartinventory-api \
            --statement-id apigateway-invoke --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" \
            --region eu-west-1 || true

          # Deploy to prod stage
          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1

          API_URL="https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod"
          echo "API_URL=$API_URL" >> $GITHUB_ENV
          echo "API Gateway URL: $API_URL"

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get API URL from API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --region eu-west-1 --query "items[?name=='smartinventory-api'].id" --output text)
          API_URL="https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod"
          echo "API_URL=$API_URL" >> $GITHUB_ENV
          echo "API URL: $API_URL"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=${{ env.API_URL }} npm run build

      - name: Create frontend S3 bucket
        run: |
          aws s3api head-bucket --bucket smartinventory-frontend-prod-udaykiran --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket smartinventory-frontend-prod-udaykiran \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

      - name: Configure static website hosting
        run: |
          aws s3 website s3://smartinventory-frontend-prod-udaykiran \
            --index-document index.html \
            --error-document index.html

      - name: Disable Block Public Access
        run: |
          aws s3api put-public-access-block --bucket smartinventory-frontend-prod-udaykiran \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

      - name: Set bucket policy for public read
        run: |
          aws s3api put-bucket-policy --bucket smartinventory-frontend-prod-udaykiran --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::smartinventory-frontend-prod-udaykiran/*"
              }
            ]
          }'

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://smartinventory-frontend-prod-udaykiran --delete
          echo "Frontend URL: http://smartinventory-frontend-prod-udaykiran.s3-website-eu-west-1.amazonaws.com"
